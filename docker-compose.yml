services:
  postgres:
    image: postgres:15
    container_name: tp_seo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tp_seo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tp_seo"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tp_seo_network

  php:
    image: php:8.3-apache
    container_name: tp_seo-php
    ports:
      - "8001:80"
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/src
      - ./config:/var/www/config
      - ./views:/var/www/views
      - ./assets:/var/www/assets
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tp_seo
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tp_seo_network
    build:
      context: .
      dockerfile: Dockerfile.php
    command: >
      sh -c "docker-php-ext-install pgsql pdo_pgsql &&
             a2enmod rewrite &&
             apache2-foreground"

volumes:
  postgres_data:

networks:
  tp_seo_network:
    driver: bridge
